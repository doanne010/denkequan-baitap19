<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài 17.3 - Đồng hồ đếm ngược</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Segoe UI', Tahoma, sans-serif;
    background:radial-gradient(ellipse at center, #1b2147 0%, #05060f 70%);
    color:#fdf6ee;
  }
  .box{
    background:#161b33;
    border-radius:16px;
    padding:36px 40px;
    text-align:center;
    box-shadow:0 6px 24px rgba(0,0,0,.5);
    width:90%;
    max-width:420px;
  }
  h1{
    color:#ffb347;
    font-size:1.5rem;
    margin:0 0 6px;
  }
  p.sub{ color:#b9bfe0; margin:0 0 24px; font-size:.9rem; }
  .timer{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:24px;
  }
  .unit{
    background:#0c1022;
    border:1px solid rgba(255,179,71,.35);
    border-radius:10px;
    padding:14px 10px;
    width:70px;
  }
  .unit .num{
    font-size:1.8rem;
    font-weight:700;
    color:#ffb347;
  }
  .unit .label{
    font-size:.7rem;
    color:#9ea4c6;
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  input[type="datetime-local"]{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid rgba(255,179,71,.35);
    background:#0c1022;
    color:#fdf6ee;
    margin-bottom:14px;
    font-size:.95rem;
  }
  button{
    background:#ffb347;
    color:#161b33;
    border:none;
    padding:10px 22px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-size:.95rem;
    transition:opacity .2s;
  }
  button:hover{ opacity:.85; }
  #status{
    margin-top:16px;
    font-size:.95rem;
    color:#9bffce;
    min-height:20px;
  }
</style>
</head>
<body>

<div class="box">
  <h1>⏳ Bài 17.3 — Đồng hồ đếm ngược</h1>
  <p class="sub">Chọn thời điểm đích, đồng hồ sẽ tự đếm ngược từng giây.</p>

  <div class="timer">
    <div class="unit"><div class="num" id="days">00</div><div class="label">Ngày</div></div>
    <div class="unit"><div class="num" id="hours">00</div><div class="label">Giờ</div></div>
    <div class="unit"><div class="num" id="minutes">00</div><div class="label">Phút</div></div>
    <div class="unit"><div class="num" id="seconds">00</div><div class="label">Giây</div></div>
  </div>

  <input type="datetime-local" id="targetDate">
  <button id="startBtn">Bắt đầu đếm ngược</button>

  <div id="status"></div>
</div>

<script>
  let countdownInterval = null;

  function pad(n){ return n.toString().padStart(2,'0'); }

  function startCountdown(){
    const input = document.getElementById('targetDate').value;
    if(!input){
      document.getElementById('status').textContent = '⚠️ Hãy chọn ngày giờ trước.';
      return;
    }
    const targetTime = new Date(input).getTime();

    if(countdownInterval) clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      const now = new Date().getTime();
      const distance = targetTime - now;

      if(distance <= 0){
        clearInterval(countdownInterval);
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        document.getElementById('status').textContent = '🎉 Đã đến thời điểm bạn chọn!';
        return;
      }

      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
      const seconds = Math.floor((distance % (1000*60)) / 1000);

      document.getElementById('days').textContent = pad(days);
      document.getElementById('hours').textContent = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);
      document.getElementById('status').textContent = '⏰ Đang đếm ngược...';
    }, 1000);
  }

  document.getElementById('startBtn').addEventListener('click', startCountdown);
</script>

</body>
</html>
